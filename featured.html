<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawLux | Featured Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body {
    display: flex;
    flex-direction: column;
    background: #0a0a0a; /* Dark theme wapas */
  }

  /* Royal Text Styling - Waisi hi jaisi pehle thi */
  .featured-eyebrow {
    color: #d4af37;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 0.9rem;
    margin-bottom: 1rem;
    font-weight: 600;
  }

  .featured-title {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    line-height: 1.1;
    color: #ffffff;
    margin-bottom: 1.5rem;
  }

  .featured-desc {
    color: rgba(255, 255, 255, 0.7);
    font-size: 1.1rem;
    line-height: 1.7;
    margin-bottom: 2.5rem;
    max-width: 500px;
  }

  .featured-banner {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    gap: 4rem;
    max-width: 1200px;
    margin: 20vh auto;
    width: 100%;
  }

  /* IMAGE BOX: Stable size, no effects */
  .featured-visual {
    flex: 1;
    width: 400px; 
    height: 400px;
    max-width: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 40px;
    overflow: hidden;
  }

  .featured-visual img {
    width: 80%; /* Image box ke andar choti aur fit hai */
    height: 80%;
    object-fit: contain;
    transition: none; /* No hover effect */
  }

  /* Navbar links style */
  .nav-links a {
    color: #ffffff !important;
    text-decoration: none;
    margin: 0 15px;
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="navbar">
  <a class="logo" href="pawlux_website.html">
    <div class="logo-icon">🐾</div>
    <div class="logo-text" style="color: white;">Paw<span style="color: #d4af37;">Lux</span></div>
  </a>
  <div class="nav-links">
    <a href="shop.html">Shop</a>
    <a href="products.html">Products</a>
    <a href="featured.html">Featured</a>
    <a href="reviews.html">Reviews</a>
    <a href="offers.html">Offers</a>
    <a href="admin.html">Admin</a>
  </div>
</nav>

<div class="featured-banner" id="featured">
  <div class="featured-content">
    <!-- Royal Text wapas original style mein -->
    <div class="featured-eyebrow">✦ Limited Collection</div>
    <h2 class="featured-title">The Royal<br>Heritage Collar</h2>
    <p class="featured-desc">Hand-stitched genuine leather with 24k gold-plated hardware. Each piece individually numbered and comes with a certificate of authenticity.</p>
    <div style="display:flex; align-items:center; gap:1.5rem;">
      <button class="btn-primary" style="background: #d4af37; color: black; border: none; padding: 15px 30px; border-radius: 30px; font-weight: 600; cursor: pointer;">
        Add to Cart — $89
      </button>
      <span style="color: rgba(255,255,255,0.5);">Only 12 left</span>
    </div>
  </div>

  <div class="featured-visual">
    <!-- Image fitted properly inside the stable box -->
    <img src="https://tse2.mm.bing.net/th/id/OIP.mBiaQzf-PuFHJWSvNGnb7wHaHa?pid=Api&h=220&P=0" alt="Royal Heritage Collar">
  </div>
</div>

<script>
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    ring.style.left = e.clientX - 14 + 'px';
    ring.style.top = e.clientY - 14 + 'px';
  });
</script>

</body>
</html>
