<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PawLux</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  /* Custom Cursor Styles */
  .cursor { width: 8px; height: 8px; background: #d4af37; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; }
  .cursor-ring { width: 30px; height: 30px; border: 1px solid rgba(212, 175, 55, 0.5); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transition: all 0.1s ease-out; }

  @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

  body.login-page {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(-45deg, #000000, #1a1a1a, #0f0f0f, #151515);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    margin: 0;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  .login-card {
    width: 90%;
    max-width: 360px; 
    padding: 1.8rem;   
    background: rgba(17, 17, 17, 0.9);
    border-radius: 24px;
    border: 1px solid rgba(212, 175, 55, 0.2);
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
  }

  .login-header .logo-icon { font-size: 1.5rem; }
  .login-header h2 { font-size: 1.4rem; margin: 8px 0; color: #fff; font-family: 'Playfair Display', serif; }

  .login-form .form-group { margin-bottom: 0.9rem; text-align: left; position: relative; }

  .form-group input {
    width: 100%;
    padding: 12px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    color: #fff;
    box-sizing: border-box; 
    transition: border-color 0.3s;
    font-size: 0.9rem;
  }

  .toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #888;
    font-size: 0.85rem;
  }

  .login-btn {
    width: 100%;
    padding: 12px;
    background: #d4af37;
    color: #000;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    margin-top: 5px;
    transition: 0.3s;
  }
  
  .login-btn:hover { background: #b8962d; transform: translateY(-2px); }

  .divider {
    margin: 18px 0;
    color: #666;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: rgba(255, 255, 255, 0.1);
  }
  .divider span { padding: 0 10px; }

  .google-signin { display: flex; justify-content: center; margin-bottom: 5px; }
  .logo-text { font-size: 1.5rem; font-weight: 700; }
</style>
</head>
<body class="login-page">

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <div class="logo-icon">🐾</div>
        <div class="logo-text" style="color:white;">Paw<span style="color:#d4af37;">Lux</span></div>
      </div>
      <h2>Welcome To PawLux</h2>
      <p style="color: #888; font-size: 0.8rem; margin-bottom: 1.2rem;">Sign in to your luxury account</p>
    </div>

    <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <input type="email" id="email" name="email" required placeholder="Email Address">
      </div>

      <div class="form-group">
        <input type="password" id="password" name="password" required placeholder="Password">
        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
      </div>

      <div class="form-options" style="display: flex; justify-content: space-between; font-size: 0.75rem; color: #777; margin-bottom: 15px;">
        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
          <input type="checkbox"> Remember
        </label>
        <a href="#" style="color: #d4af37; text-decoration: none;">Forgot?</a>
      </div>

      <button type="submit" class="login-btn">Sign In</button>
    </form>

    <div class="divider"><span>or</span></div>

    <div class="google-signin">
      <div id="g_id_onload"
           data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE"
           data-callback="handleCredentialResponse">
      </div>
      <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large" data-shape="pill" data-width="300"></div>
    </div>

    <div class="signup-link" style="font-size: 0.8rem; color: #777; margin-top: 12px;">
      <p>New to PawLux? <a href="#" style="color: #d4af37; text-decoration: none; font-weight: 600;">Create Account</a></p>
    </div>
  </div>
</div>

<script>
  // Custom Cursor
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    ring.style.left = (e.clientX - 14) + 'px';
    ring.style.top = (e.clientY - 14) + 'px';
  });

  // Password Visibility Toggle
  const togglePassword = document.querySelector('#togglePassword');
  const password = document.querySelector('#password');

  togglePassword.addEventListener('click', function () {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    this.classList.toggle('fa-eye-slash');
  });

  // Handle Form Login Redirection[cite: 5, 8]
  function handleLogin(event) {
    event.preventDefault();
    // Redirecting to main dashboard/website
    window.location.href = "pawlux_website.html"; 
  }

  // Google Login Callback
  function handleCredentialResponse(response) {
    window.location.href = "pawlux_website.html"; 
  }
</script>
</body>
</html>
