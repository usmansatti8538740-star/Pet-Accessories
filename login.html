<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PawLux</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="login-page">

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <div class="logo-icon">🐾</div>
        <div class="logo-text">Paw<span>Lux</span></div>
      </div>
      <h2>Welcome TO PawLUX</h2>
      <p>Sign in to access your account</p>
    </div>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter your password">
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" id="remember"> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary login-btn">Sign In</button>
    </form>

    <div class="divider">
      <span>or</span>
    </div>

    <div class="google-signin">
      <div id="g_id_onload"
           data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE"
           data-login_uri="http://localhost:8000/login.html"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-text="signin_with"
           data-shape="rectangular"
           data-logo_alignment="left">
      </div>
    </div>

    <div class="signup-link">
      <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
