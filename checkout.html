<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawLux Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  /* --- Cursor Setup (Website Theme) --- */
  body { cursor: none; }
  .cursor {
    width: 8px;
    height: 8px;
    background: #d4af37;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
  }
  .cursor-ring {
    width: 30px;
    height: 30px;
    border: 1px solid #d4af37;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transition: all 0.1s ease-out;
  }

  .checkout-container {
    max-width: 1200px;
    margin: 120px auto 60px auto; 
    padding: 15px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  }

  .checkout-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  /* Payment Options */
  .payment-option {
    padding: 12px;
    border: 2px solid #eee;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    transition: 0.3s;
  }

  .payment-option:hover { border-color: #d4af37; background: #faf8f5; }

  .payment-option img {
    width: 35px;
    height: 35px;
    object-fit: contain;
  }

  .payment-details {
    display: none;
    padding: 12px;
    background: #fdfaf3;
    border-radius: 8px;
    margin-bottom: 15px;
  }

  .payment-details.active { display: block; animation: fadeIn 0.4s; }

  /* Success Container */
  .success-container {
    display: none;
    max-width: 600px;
    margin: 120px auto;
    padding: 40px 20px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    text-align: center;
  }

  .success-container.show { display: block; }
  .checkout-form.hide { display: none; }

  .success-icon {
    width: 70px;
    height: 70px;
    background: #4BB543;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    margin: 0 auto 20px;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<!-- Custom Cursor Elements -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="navbar">
  <a class="logo" href="pawlux_website.html">
    <div class="logo-icon">🐾</div>
    <div class="logo-text">Paw<span>Lux</span></div>
  </a>
  <div class="nav-links">
    <a href="shop.html">Shop</a>
    <a href="products.html">Products</a>
    <a href="featured.html">Featured</a>
    <a href="reviews.html">Reviews</a>
    <a href="offers.html">Offers</a>
  </div>
  <div class="nav-actions">
    <button class="nav-cart" id="cartBtn" onclick="window.location.href='cart.html'">
      🛒 <span class="cart-badge" id="cartCount">0</span>
    </button>
  </div>
</nav>

<!-- SUCCESS PAGE -->
<div class="success-container" id="successContainer">
  <div class="success-icon">✓</div>
  <h2>Order Confirmed!</h2>
  <p>Your request has been processed successfully.</p>
  <div style="background:#f9f9f9; padding:15px; border-radius:10px; margin-top:20px; text-align:left;">
    <p><strong>Order ID:</strong> <span id="resOrderId"></span></p>
    <p><strong>Total:</strong> <span id="resTotal"></span></p>
  </div>
  <button onclick="window.location.href='shop.html'" style="width:100%; padding:12px; background:#1a1a1a; color:white; border:none; border-radius:8px; margin-top:20px;">
    Back to Shop
  </button>
</div>

<script>
  // --- Cursor Logic ---
  const cursor = document.getElementById('cursor');
  const cursorRing = document.getElementById('cursorRing');

  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    cursorRing.style.left = (e.clientX - 11) + 'px';
    cursorRing.style.top = (e.clientY - 11) + 'px';
  });

  function togglePaymentDetails(method) {
    document.querySelectorAll('.payment-details').forEach(el => el.classList.remove('active'));
    document.getElementById(method + 'Details').classList.add('active');
  }

  function submitOrder(event) {
    event.preventDefault();
    
    // Foran upar scroll karein taake success message dikhe
    window.scrollTo({ top: 0, behavior: 'smooth' });

    document.getElementById('checkoutForm').classList.add('hide');
    document.getElementById('successContainer').classList.add('show');

    document.getElementById('resOrderId').textContent = '#PL-' + Math.floor(Math.random() * 9000);
    document.getElementById('resTotal').textContent = document.getElementById('totalAmount').textContent;

    localStorage.removeItem('pawluxCart');
  }

  window.onload = () => {
    // Total price logic (apne main script se link karein)
    document.getElementById('totalAmount').textContent = "$100.00";
  };
</script>

</body>
