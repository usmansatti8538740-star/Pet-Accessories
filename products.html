<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawLux Products</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<nav id="navbar">
  <a class="logo" href="pawlux_website.html">
    <div class="logo-icon">🐾</div>
    <div class="logo-text">Paw<span>Lux</span></div>
  </a>
  <div class="nav-links">
    <a href="shop.html">Shop</a>
    <a href="products.html">Products</a>
    <a href="featured.html">Featured</a>
    <a href="reviews.html">Reviews</a>
    <a href="offers.html">Offers</a>
  </div>
  <div class="nav-actions">
    <button class="nav-cart" id="cartBtn" onclick="goToCart()">
      🛒
      <span class="cart-badge" id="cartCount">0</span>
    </button>
  </div>
</nav>
<section class="section products-section" id="products">
  <div class="section-header reveal">
    <div class="section-eyebrow">Handpicked for You</div>
    <h2 class="section-title">Featured <em>Products</em></h2>
  </div>
  <div class="products-filter reveal">
    <button class="filter-btn active" onclick="setFilter(this,'all')">All Products</button>
    <button class="filter-btn" onclick="setFilter(this,'collars')">Collars & Leashes</button>
    <button class="filter-btn" onclick="setFilter(this,'beds')">Beds & Comfort</button>
    <button class="filter-btn" onclick="setFilter(this,'toys')">Toys</button>
    <button class="filter-btn" onclick="setFilter(this,'grooming')">Grooming</button>
    <button class="filter-btn" onclick="setFilter(this,'food')">Bowls & Food</button>
  </div>
  <div class="products-grid" id="productsGrid"></div>
  <div style="text-align:center; margin-top:3rem;">
    <button class="btn-outline" onclick="showToast('📦 Loading more products...')">Load More Products</button>
  </div>
</section>
<script src="script.js"></script>
</body>
</html>
